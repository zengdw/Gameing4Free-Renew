name: Auto Renew Gameing4Free Server

on:
  repository_dispatch:
    types: [gameing-renew]
  workflow_dispatch:      # 允许手动触发

# 显式声明 GITHUB_TOKEN 的 actions 写入权限，以便能够删除旧记录
permissions:
  actions: write
  contents: read

jobs:
  renew:
    # runs-on: ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install and Start Cloudflare WARP
        run: |
          echo "Installing Cloudflare WARP..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

          echo "Starting Cloudflare WARP service..."
          sudo systemctl start warp-svc
          sleep 2

          echo "Registering WARP client..."
          sudo warp-cli --accept-tos registration new || sudo warp-cli --accept-tos register

          echo "Setting WARP mode to proxy..."
          sudo warp-cli --accept-tos set-mode proxy || sudo warp-cli --accept-tos mode proxy

          echo "Connecting to WARP..."
          sudo warp-cli --accept-tos connect

          echo "Verifying proxy connection..."
          for i in {1..15}; do
            if curl -s --proxy socks5h://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace | grep -q "warp=on"; then
              echo "Proxy is working and WARP is active!"
              curl --proxy socks5h://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace
              break
            fi
            echo "Waiting for proxy to respond..."
            sleep 2
          done

      - name: Install System Dependencies for SeleniumBase
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-xkb-utils xfonts-100dpi xfonts-75dpi xfonts-scalable xfonts-cyrillic ffmpeg unzip curl gnupg
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb
          pip install seleniumbase pyvirtualdisplay requests

      - name: Run Auto-Renew Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WARP_PROXY: "socks5://127.0.0.1:40000"
        run: |
          python main.py

      - name: Delete Old Workflow Runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows \
            --jq '.workflows[] | select(.name == "${{ github.workflow }}") | .id')
          echo "Workflow ID: $WORKFLOW_ID"
          gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs" \
            --paginate \
            --jq '.workflow_runs[5:][] | .id' \
            | while read id; do
                echo "Deleting run $id"
                gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id"
              done
