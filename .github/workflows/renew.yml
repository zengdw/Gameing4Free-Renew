name: Auto Renew Gameing4Free Server

on:
  schedule:
    - cron: '23 * * * *'  # 每小时的 23 分执行
  workflow_dispatch:      # 允许手动触发

# 显式声明 GITHUB_TOKEN 的 actions 写入权限，以便能够删除旧记录
permissions:
  actions: write
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install and Start sing-box
        env:
          SING_BOX_CONFIG: ${{ secrets.SING_BOX_CONFIG }}
        run: |
          echo "Downloading sing-box..."
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.13.14/sing-box-1.13.14-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-1.13.14-linux-amd64/sing-box /usr/local/bin/
          rm -rf sing-box.tar.gz sing-box-1.13.14-linux-amd64

          mkdir -p ~/.config/sing-box
          if [ -z "$SING_BOX_CONFIG" ]; then
            echo "ERROR: Please set the SING_BOX_CONFIG secret in your repository settings."
            exit 1
          fi
          echo "$SING_BOX_CONFIG" > ~/.config/sing-box/config.json

          echo "Starting sing-box in background..."
          sudo sing-box run -c ~/.config/sing-box/config.json > sing-box.log 2>&1 &
          
          sleep 3
          if pgrep -x "sing-box" > /dev/null; then
            echo "sing-box started successfully!"
          else
            echo "sing-box failed to start! Log content:"
            cat sing-box.log
            exit 1
          fi

          echo "Verifying proxy connection..."
          for i in {1..10}; do
            if curl -s --proxy socks5://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace > /dev/null; then
              echo "Proxy is working!"
              curl --proxy socks5://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace
              break
            fi
            echo "Waiting for proxy to respond..."
            sleep 2
          done

      - name: Install System Dependencies for SeleniumBase
        run: |
          pip install seleniumbase
          seleniumbase install chrome
          seleniumbase install chromedriver

      - name: Run Auto-Renew Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WARP_PROXY: "socks5://127.0.0.1:40000"
        run: |
          python main.py

      - name: Delete Old Workflow Runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows \
            --jq '.workflows[] | select(.name == "${{ github.workflow }}") | .id')
          echo "Workflow ID: $WORKFLOW_ID"
          gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs" \
            --paginate \
            --jq '.workflow_runs[2:][] | .id' \
            | while read id; do
                echo "Deleting run $id"
                gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id"
              done