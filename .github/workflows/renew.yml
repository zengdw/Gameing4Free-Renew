name: Auto Renew Gameing4Free Server

on:
  repository_dispatch:
    types: [gameing-renew]
  workflow_dispatch:      # 允许手动触发

# 显式声明 GITHUB_TOKEN 的 actions 写入权限，以便能够删除旧记录
permissions:
  actions: write
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install and Start Xray
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          echo "Downloading Xray..."
          curl -Lo xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
          unzip xray.zip -d xray_temp
          sudo mv xray_temp/xray /usr/local/bin/
          # 将解压出来的 geoip.dat 和 geosite.dat 资源文件一并移动到运行目录中，供 xray 路由模块正常读取
          sudo mv xray_temp/*.dat /usr/local/bin/
          rm -rf xray.zip xray_temp

          echo $(xray version)

          mkdir -p ~/.config/xray
          if [ -z "$XRAY_CONFIG" ]; then
            echo "ERROR: Please set the XRAY_CONFIG secret in your repository settings."
            exit 1
          fi
          echo "$XRAY_CONFIG" > ~/.config/xray/config.json

          echo "Starting Xray in background..."
          sudo xray run -c ~/.config/xray/config.json > xray.log 2>&1 &
          
          sleep 3
          if pgrep -x "xray" > /dev/null; then
            echo "Xray started successfully!"
          else
            echo "Xray failed to start! Log content:"
            cat xray.log
            exit 1
          fi

          echo "Verifying proxy connection..."
          for i in {1..10}; do
            if curl -s --proxy http://127.0.0.1:7897 https://www.cloudflare.com/cdn-cgi/trace > /dev/null; then
              echo "Proxy is working!"
              curl --proxy http://127.0.0.1:7897 https://www.cloudflare.com/cdn-cgi/trace
              break
            fi
            echo "Waiting for proxy to respond..."
            sleep 2
          done

      - name: Install System Dependencies for SeleniumBase
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev scrot xvfb
          pip install seleniumbase pyautogui pyvirtualdisplay
          seleniumbase install chrome
          seleniumbase install chromedriver

      - name: Run Auto-Renew Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WARP_PROXY: "http://127.0.0.1:7897"
        run: |
          python main.py

      - name: Delete Old Workflow Runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows \
            --jq '.workflows[] | select(.name == "${{ github.workflow }}") | .id')
          echo "Workflow ID: $WORKFLOW_ID"
          gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs" \
            --paginate \
            --jq '.workflow_runs[5:][] | .id' \
            | while read id; do
                echo "Deleting run $id"
                gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id"
              done
