name: Auto Renew Gameing4Free Server

on:
  schedule:
    - cron: '23 * * * *'  # 每小时的 23 分执行
  workflow_dispatch:      # 允许手动触发

# 显式声明 GITHUB_TOKEN 的 actions 写入权限，以便能够删除旧记录
permissions:
  actions: write
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install System Dependencies for SeleniumBase
        run: |
          uv sync
          seleniumbase install chrome
          seleniumbase install chromedriver

      - name: Run Auto-Renew Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          uv run main.py

      - name: Delete Old Workflow Runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows \
            --jq '.workflows[] | select(.name == "${{ github.workflow }}") | .id')
          echo "Workflow ID: $WORKFLOW_ID"
          gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs" \
            --paginate \
            --jq '.workflow_runs[2:][] | .id' \
            | while read id; do
                echo "Deleting run $id"
                gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id"
              done